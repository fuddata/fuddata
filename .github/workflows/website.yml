name: website

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install postcss-cli tailwindcss autoprefixer

      - name: Install extended version of Hugo
        run: |
          wget -o /dev/null https://github.com/gohugoio/hugo/releases/download/v0.120.4/hugo_extended_0.120.4_linux-amd64.deb -O /tmp/hugo.deb
          sudo dpkg -i /tmp/hugo.deb

      - name: Generate Hugo pages
        run: |
          git submodule init
          git submodule update --recursive
          cp -f hugo.yaml themes/tailbliss/
          hugo --minify --gc
          echo -n "fuddata.com" > public/CNAME

      - name: Deploy to GitHub Pages
        if: success()
        uses: crazy-max/ghaction-github-pages@v2
        with:
          target_branch: gh-pages
          build_dir: public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
