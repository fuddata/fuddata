<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuddata</title>
  <link rel="stylesheet" href="/static/css/index.css" />
  <link rel="stylesheet" href="/static/css/content.css" />
  <script type="module" src="/static/js/index.js"></script>
  <script>
function toggleMenu() {
  var x = document.getElementsByClassName("navbar_links")[0];
  if (x.className === "navbar_links") {
    x.className += " block";
  } else {
    x.className = "navbar_links";
  }
}
  </script>
  <!-- TODO: Remove this when page is ready -->
  <style>
    #navbar_warn {
      position: absolute;
      color: red;
      font-weight: bold;
    }
    @media screen and (min-width: 768px) {
      #navbar_warn {
        font-size: 30px;
        left: 250px;
        top: 20px;
      }
    }
    @media screen and (max-width: 767px) {
      #navbar_warn {
        font-size: 20px;
        left: 10px;
        top: 60px;
      }
    }
  </style>
</head>
<body>
  <div id="navbar">
    <!-- TODO: Remove this when page is ready -->
    <div id="navbar_warn">Warning!!! This webpage is on beta testing phase.</div>
    <a href="/" class="nohover" data-link>
      <img id="navbar_logo" src="/static/img/logo.svg" alt="Navbar Logo" width="150px" />
    </a>
    <nav class="navbar_links">
      <a href="/contact" class="navbar" data-link>Contact</a>
      <!--
      <a href="/bug-bounty" class="navbar" data-link>Bug Bounty</a>
      <a href="/roadmap" class="navbar" data-link>Roadmap</a>
      -->
      <a href="https://github.com/fuddata" class="navbar" target="_blank" rel="noopener noreferrer">Github</a>
      <a href="https://www.linkedin.com/company/fuddata" class="navbar" target="_blank" rel="noopener noreferrer"">Linkedin</a>
      <a href="https://www.youtube.com/@fuddata" class="navbar" target="_blank" rel="noopener noreferrer">Youtube</a>
    </nav>
    <div id="navbar_buttons">
      <div id="login_form_container_email" class="login_form hidden">
        <form class="login_form_email">
          <label for="email" id="login_form_email_label" class="">Email address:</label>
          <input type="email" id="login_form_email" name="email" class="" required>
          <button type="submit" name="login_form_email_btn" class="">Request one-time password</button>
        </form>
      </div>
      <div id="login_form_container_otp" class="login_form hidden">
        <form class="login_form">
          <label for="otp">One time password:</label>
          <input type="otp" id="login_form_otp" name="otp">
          <button type="submit" name="login_form_otp_btn">Login</button>
        </form>
      </div>
      <button onclick="document.getElementById('login_form_container_email').classList.toggle('hidden')">Login</button>
      <a href="javascript:void(0);" id="navbar_buttons" onclick="toggleMenu()">&#9776;</a>
    </div>
  </div>
  <main id="content_border">
    <div id="content"></div>
  </main>
  <div id="footer">
    <div>
      <img id="footer_logo" src="/static/img/logo.svg" alt="Footer Logo" width="80px" />
    </div>
    <div id="footer_text">
      Copyright © 2024 Fuddata Limited.
    </div>
    <div id="footer_link">
      <a href="/terms" data-link>Terms</a>
      <a href="/privacy" data-link>Privacy</a>
    </div>
  </div>
</body>
</html>
